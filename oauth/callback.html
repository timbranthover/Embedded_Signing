<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Authorizing — Arbor Wealth</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #F5F2EC;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1C2028;
    }
    .card {
      background: #fff;
      border: 1px solid #E6E1D6;
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      max-width: 400px;
      width: 90vw;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: #1B2951;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    p  { font-size: 13px; color: #6B7280; margin-bottom: 4px; }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #E6E1D6;
      border-top-color: #B8935A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #9B2335; background: #FDE8EB; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C8A96E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="22" x2="21" y2="22"/>
        <line x1="6" y1="18" x2="6" y2="11"/>
        <line x1="10" y1="18" x2="10" y2="5"/>
        <line x1="14" y1="18" x2="14" y2="9"/>
        <line x1="18" y1="18" x2="18" y2="2"/>
      </svg>
    </div>
    <h1>Authorizing…</h1>
    <p>Completing DocuSign authorization.</p>
    <p>This window will close shortly.</p>
    <div class="spinner" id="spinner"></div>
    <div class="error" id="error" style="display:none"></div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code  = params.get('code');
      var state = params.get('state');
      var error = params.get('error');
      var errorDesc = params.get('error_description');

      function showError(msg) {
        document.getElementById('spinner').style.display = 'none';
        var el = document.getElementById('error');
        el.style.display = 'block';
        el.textContent = msg;
      }

      if (error) {
        showError(error + (errorDesc ? ': ' + errorDesc : ''));
        // Still notify opener so it can show the error
        if (window.opener) {
          window.opener.postMessage({
            type: 'docusign_oauth_code',
            error: error + (errorDesc ? ': ' + errorDesc : ''),
          }, window.location.origin);
        }
        return;
      }

      if (!code) {
        showError('No authorization code received.');
        return;
      }

      // Send code to parent/opener
      var target = window.opener || window.parent;
      if (target && target !== window) {
        target.postMessage({
          type: 'docusign_oauth_code',
          code: code,
          state: state,
        }, window.location.origin);
        // Give a moment for the message to arrive, then close
        setTimeout(function () { window.close(); }, 800);
      } else {
        // Fallback: no opener — store in sessionStorage and redirect
        sessionStorage.setItem('oauth_callback_code', code);
        sessionStorage.setItem('oauth_callback_state', state || '');
        // Try to navigate back to the app
        var base = window.location.origin + window.location.pathname.replace(/\/oauth\/callback\.html$/, '');
        window.location.replace(base + '/');
      }
    })();
  </script>
</body>
</html>
